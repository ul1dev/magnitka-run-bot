services:
  magnitkarunbot:
    build: ./

    container_name: 'magnitkarunbot'
    image: ulidev/magnitkarunbot:v1.0.2
    user: '1000:1000'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    init: true
    tmpfs:
      - /tmp
      - /app/logs

    restart: always

    env_file:
      - .${NODE_ENV:-production}.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - '127.0.0.1:8080:8080'

    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8080/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

    networks:
      - magnitkarunbot_network

  postgres:
    image: postgres:16-alpine
    container_name: magnitkarunbot-postgres
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_OVERRIDE
    env_file:
      - .${NODE_ENV:-production}.env
    environment:
      POSTGRES_USER: ${DB_USER:-MainUser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-MainPassword}
      POSTGRES_DB: ${DB_DBNAME:-MagnitkaRunDatabase}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - magnitkarunbot_pg_data:/var/lib/postgresql/data
    networks:
      - magnitkarunbot_network
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-MainUser} -d ${DB_DBNAME:-MagnitkaRunDatabase}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  magnitkarunbot_network:
    name: magnitkarunbot_network
    driver: bridge

volumes:
  magnitkarunbot_pg_data:
