services:
  magnitkarunbot:
    build: ./

    container_name: 'magnitkarunbot'
    image: ulidev/magnitkarunbot
    user: '1000:1000'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs

    restart: always

    env_file:
      - .${NODE_ENV:-production}.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - '127.0.0.1:8080:8080'

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - magnitkarunbot_network

  postgres:
    image: postgres:16-alpine
    container_name: magnitkarunbot-postgres
    restart: always
    user: '70:70'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    env_file:
      - .${NODE_ENV:-production}.env
    environment:
      POSTGRES_USER: ${DB_USER:-MainUser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-MainPassword}
      POSTGRES_DB: ${DB_DBNAME:-MagnitkaRunDatabase}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - magnitkarunbot_pg_data:/var/lib/postgresql/data/pgdata
    networks:
      - magnitkarunbot_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-MainUser} -d ${DB_DBNAME:-MagnitkaRunDatabase}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  magnitkarunbot_network:
    driver: bridge

volumes:
  magnitkarunbot_pg_data:
